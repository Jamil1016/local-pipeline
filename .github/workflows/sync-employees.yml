name: "Sync: Employee Reference"

on:
  repository_dispatch:
    types: [sync-employees]
  workflow_dispatch:
    inputs:
      effective_date:
        description: "Effective date for changes (YYYY-MM-DD, default today)"
        required: false

concurrency:
  group: sync-employees
  cancel-in-progress: false

env:
  PIPELINE_DIR: swift_api_pipeline

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          cat > .env <<'DOTENV'
          SWIFT_EMAIL=mgmt@example.com
          SUPABASE_URL=https://YOUR_PROJECT_REF.supabase.co
          SUPABASE_HOST=aws-0-ap-southeast-1.pooler.supabase.com
          SUPABASE_PORT=5432
          SUPABASE_DB=postgres
          SUPABASE_USER=postgres.YOUR_PROJECT_REF
          SWIFT_PASSWORD=${{ secrets.SWIFT_PASSWORD }}
          SUPABASE_PASSWORD=${{ secrets.SUPABASE_PASSWORD }}
          DOTENV

      - name: Decode credentials
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          mkdir -p gmail_credentials
          echo "${{ secrets.NOTIFIER_CREDENTIALS_JSON }}" | base64 -d > gmail_credentials/credentials.json
          echo "${{ secrets.SHEETS_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/sheets_token.pickle

      - name: Sync employees
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          DATE_ARG=""
          if [ -n "${{ github.event.inputs.effective_date }}" ]; then
            DATE_ARG="--date ${{ github.event.inputs.effective_date }}"
          fi
          python -u sync_employees.py --apply $DATE_ARG

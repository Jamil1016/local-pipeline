name: "Pipeline: Asset Tasks Export"

on:
  repository_dispatch:
    types: [pipeline-asset-tasks-export]
  workflow_dispatch:

concurrency:
  group: pipeline-asset-tasks-export
  cancel-in-progress: false

env:
  PIPELINE_DIR: swift_api_pipeline

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          cat > .env <<'DOTENV'
          SWIFT_EMAIL=mgmt@example.com
          SUPABASE_URL=https://YOUR_PROJECT_REF.supabase.co
          SUPABASE_HOST=aws-0-ap-southeast-1.pooler.supabase.com
          SUPABASE_PORT=5432
          SUPABASE_DB=postgres
          SUPABASE_USER=postgres.YOUR_PROJECT_REF
          SWIFT_PASSWORD=${{ secrets.SWIFT_PASSWORD }}
          SUPABASE_PASSWORD=${{ secrets.SUPABASE_PASSWORD }}
          DOTENV

      - name: Decode credentials
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          mkdir -p gmail_credentials
          echo "${{ secrets.NOTIFIER_CREDENTIALS_JSON }}" | base64 -d > gmail_credentials/credentials.json
          echo "${{ secrets.NOTIFIER_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/token.pickle
          echo "${{ secrets.DRIVE_SHARED_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/drive_shared_token.pickle

      - name: Export asset tasks (Excel + CSV ZIP + Drive upload + email)
        working-directory: scripts-reference
        run: python -u export_asset_tasks_excel.py

      - name: Upload asset tasks to shared Drive
        working-directory: scripts-reference
        continue-on-error: true
        run: python -u upload_to_shared_drive.py --export asset_tasks

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asset-tasks-export-logs
          path: '${{ env.PIPELINE_DIR }}/pipeline_logs/*.log'
          retention-days: 7

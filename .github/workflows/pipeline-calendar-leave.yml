name: "Pipeline: Calendar Leave"

on:
  repository_dispatch:
    types: [pipeline-calendar-leave]
  workflow_dispatch:

concurrency:
  group: pipeline-calendar-leave
  cancel-in-progress: false

env:
  PIPELINE_DIR: swift_api_pipeline

jobs:
  calendar-leave:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          cat > .env <<'DOTENV'
          SWIFT_EMAIL=mgmt@example.com
          SUPABASE_URL=https://YOUR_PROJECT_REF.supabase.co
          SUPABASE_HOST=aws-0-ap-southeast-1.pooler.supabase.com
          SUPABASE_PORT=5432
          SUPABASE_DB=postgres
          SUPABASE_USER=postgres.YOUR_PROJECT_REF
          SWIFT_PASSWORD=${{ secrets.SWIFT_PASSWORD }}
          SUPABASE_PASSWORD=${{ secrets.SUPABASE_PASSWORD }}
          DOTENV
          echo "CLAUDE_API_KEY=${{ secrets.CLAUDE_API_KEY }}" >> .env

      - name: Decode credentials
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          mkdir -p gmail_credentials
          echo "${{ secrets.NOTIFIER_CREDENTIALS_JSON }}" | base64 -d > gmail_credentials/credentials.json
          echo "${{ secrets.NOTIFIER_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/token.pickle
          echo "${{ secrets.CALENDAR_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/calendar_token.pickle

      - name: Run calendar leave (with retry)
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          python -u extract_calendar_leave.py || {
            echo "Calendar leave failed, retrying after 2 minutes..."
            sleep 120
            python -u extract_calendar_leave.py
          }

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: calendar-leave-logs
          path: '${{ env.PIPELINE_DIR }}/pipeline_logs/*.log'
          retention-days: 7

name: "Pipeline: Asset Tasks"

# Single orchestrator workflow that replaces the local Windows batch step
# scheduled_main_pipeline.bat (Task 6 retires that batch after a ~1-week
# shakedown overlap, during which Apps Script fires this workflow with
# dispatch_downstream=false so the still-active local batch keeps owning
# the downstream dispatches).
#
# Triggered by:
#   - repository_dispatch type 'pipeline-asset-tasks' (from scripts/pipeline_trigger.gs
#     under jamil.mendez@example.com)
#   - workflow_dispatch (manual, with optional project recovery)
#
# Plan: docs/plans/2026-04-16-asset-tasks-gha-migration.md Task 5
# Workflow revisions vs plan:
#   - Apps Script trigger instead of cron (per MEMORY.md: GHA cron unreliable)
#   - Added `--pipeline assets` step (asset_status enrichment; missed by plan)
#   - Added date-validator-daily dispatch (validator's reliable trigger path)
#   - Added dispatch_downstream input to gate the dispatch step during shakedown

on:
  repository_dispatch:
    types: [pipeline-asset-tasks]
  workflow_dispatch:
    inputs:
      stage:
        description: 'Stage: full (extract+transform), extract (Swift API -> raw only), or transform (raw -> staging only, reuses last successful extract). Use transform to recover an empty/failed staging WITHOUT re-pulling the ~26-min API extract.'
        required: false
        type: choice
        options:
          - full
          - extract
          - transform
        default: full
      project:
        description: 'Single project recovery (e.g. TS16). Leave empty for full run. (full stage only)'
        required: false
        type: string
      dispatch_downstream:
        description: 'Fire export + timer-discrepancies + date-validator dispatches at end. Set false during shakedown overlap with local batch.'
        required: false
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: pipeline-asset-tasks
  cancel-in-progress: false

env:
  PIPELINE_DIR: swift_api_pipeline

jobs:
  asset-tasks:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      # Normalize inputs: workflow_dispatch uses inputs.*, repository_dispatch
      # uses github.event.client_payload.*. Combine into job-level env vars so
      # the rest of the workflow doesn't have to switch on github.event_name.
      - name: Resolve inputs
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PROJECT="${{ inputs.project }}"
            DD_RAW="${{ inputs.dispatch_downstream }}"
            STAGE="${{ inputs.stage }}"
          else
            PROJECT="${{ github.event.client_payload.project }}"
            DD_RAW="${{ github.event.client_payload.dispatch_downstream }}"
            STAGE="${{ github.event.client_payload.stage }}"
          fi
          # stage defaults to 'full' (nightly repository_dispatch path stays extract+transform)
          if [ -z "$STAGE" ]; then STAGE="full"; fi
          # dispatch_downstream defaults to true; only an explicit 'false' suppresses
          if [ "$DD_RAW" = "false" ]; then
            DD="false"
          else
            DD="true"
          fi
          echo "stage=$STAGE" >> $GITHUB_OUTPUT
          echo "project=$PROJECT" >> $GITHUB_OUTPUT
          echo "dispatch_downstream=$DD" >> $GITHUB_OUTPUT
          echo "Resolved: stage='$STAGE', project='$PROJECT', dispatch_downstream='$DD'"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create .env
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          cat > .env <<'DOTENV'
          SWIFT_EMAIL=mgmt@example.com
          SUPABASE_URL=https://YOUR_PROJECT_REF.supabase.co
          SUPABASE_HOST=aws-0-ap-southeast-1.pooler.supabase.com
          SUPABASE_PORT=5432
          SUPABASE_DB=postgres
          SUPABASE_USER=postgres.YOUR_PROJECT_REF
          SWIFT_PASSWORD=${{ secrets.SWIFT_PASSWORD }}
          SUPABASE_PASSWORD=${{ secrets.SUPABASE_PASSWORD }}
          DOTENV

      - name: Decode notifier credentials
        working-directory: ${{ env.PIPELINE_DIR }}
        run: |
          mkdir -p gmail_credentials
          echo "${{ secrets.NOTIFIER_CREDENTIALS_JSON }}" | base64 -d > gmail_credentials/credentials.json
          echo "${{ secrets.NOTIFIER_TOKEN_PICKLE }}" | base64 -d > gmail_credentials/token.pickle

      - name: Run asset tasks pipeline (stage-aware)
        working-directory: ${{ env.PIPELINE_DIR }}
        env:
          PROJECT: ${{ steps.resolve.outputs.project }}
          STAGE: ${{ steps.resolve.outputs.stage }}
        run: |
          case "$STAGE" in
            extract)
              echo "Stage: EXTRACT only (Swift API -> raw_asset_tasks)"
              python -u main.py --pipeline asset_tasks_extract
              ;;
            transform)
              # Reuses the latest successful asset_tasks_extract run_id. Use this
              # to recover an empty/failed staging without re-pulling the API.
              echo "Stage: TRANSFORM only (raw_asset_tasks -> stg_assets + stg_asset_tasks)"
              python -u main.py --pipeline asset_tasks_transform
              ;;
            *)
              if [ -n "$PROJECT" ]; then
                echo "Stage: FULL, single-project recovery --project $PROJECT"
                python -u main.py --pipeline asset_tasks --project "$PROJECT"
              else
                echo "Stage: FULL (extract + transform)"
                python -u main.py --pipeline asset_tasks
              fi
              ;;
          esac

      - name: Run assets pipeline (asset_status enrichment)
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.stage != 'extract' }}
        working-directory: ${{ env.PIPELINE_DIR }}
        # Failure here is non-fatal in the local batch (asset_status NULL is
        # degrading-but-acceptable downstream). Mirror that semantics.
        continue-on-error: true
        run: python -u main.py --pipeline assets --no-email

      - name: Run backfill (asset_did)
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.stage != 'extract' }}
        working-directory: ${{ env.PIPELINE_DIR }}
        run: python -u main.py --pipeline backfill --no-email

      - name: Refresh analytics MVs
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.stage != 'extract' }}
        working-directory: ${{ env.PIPELINE_DIR }}
        run: python -u main.py --pipeline analytics --no-email

      - name: Dispatch downstream workflows (asset-tasks-export, timer-discrepancies, invoicing)
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.dispatch_downstream == 'true' && steps.resolve.outputs.stage != 'extract' }}
        run: |
          # pipeline-invoicing runs here (after the worklist refresh) so the quote
          # MVs its tail rebuilds use fresh worklist + freshly-loaded invoice data.
          for event in pipeline-asset-tasks-export pipeline-timer-discrepancies pipeline-invoicing; do
            response=$(curl -sw '\n%{http_code}' -X POST \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/${{ github.repository }}/dispatches" \
              -d "{\"event_type\": \"$event\"}")
            code=$(echo "$response" | tail -n1)
            echo "Dispatched $event -> HTTP $code"
            if [ "$code" != "204" ]; then
              echo "ERROR: dispatch failed for $event"
              exit 1
            fi
          done

      - name: Dispatch date-validator-daily (cross-repo, requires DATE_VALIDATOR_DISPATCH_PAT)
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.dispatch_downstream == 'true' && steps.resolve.outputs.stage != 'extract' }}
        # Non-fatal: validator triggering issues should be logged but not crash the run.
        continue-on-error: true
        run: |
          if [ -z "${{ secrets.DATE_VALIDATOR_DISPATCH_PAT }}" ]; then
            echo "WARN: DATE_VALIDATOR_DISPATCH_PAT not set — skipping cross-repo dispatch"
            exit 0
          fi
          response=$(curl -sw '\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${{ secrets.DATE_VALIDATOR_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/jamilmendez-internal/date-validator/dispatches" \
            -d '{"event_type": "date-validator-daily", "client_payload": {"source": "gha-pipeline-asset-tasks"}}')
          code=$(echo "$response" | tail -n1)
          echo "Dispatched date-validator-daily -> HTTP $code"
          if [ "$code" != "204" ]; then
            echo "WARN: date-validator dispatch failed; check PAT validity"
          fi

      - name: Dispatch weekly-compliance-audit (Fridays only, cross-repo)
        if: ${{ steps.resolve.outputs.project == '' && steps.resolve.outputs.dispatch_downstream == 'true' && steps.resolve.outputs.stage != 'extract' }}
        continue-on-error: true
        run: |
          DOW=$(date -u +%u)
          if [ "$DOW" != "5" ]; then
            echo "Not Friday (UTC dow=$DOW) — skipping weekly compliance dispatch"
            exit 0
          fi
          if [ -z "${{ secrets.DATE_VALIDATOR_DISPATCH_PAT }}" ]; then
            echo "WARN: DATE_VALIDATOR_DISPATCH_PAT not set — skipping cross-repo dispatch"
            exit 0
          fi
          response=$(curl -sw '\n%{http_code}' -X POST \
            -H "Authorization: Bearer ${{ secrets.DATE_VALIDATOR_DISPATCH_PAT }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/jamilmendez-internal/report-automation/dispatches" \
            -d '{"event_type": "weekly-compliance-audit", "client_payload": {"source": "gha-pipeline-asset-tasks"}}')
          code=$(echo "$response" | tail -n1)
          echo "Dispatched weekly-compliance-audit -> HTTP $code"
          if [ "$code" != "204" ]; then
            echo "WARN: weekly-compliance dispatch failed; check PAT has report-automation scope"
          fi

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: asset-tasks-logs
          path: '${{ env.PIPELINE_DIR }}/pipeline_logs/*.log'
          retention-days: 7
